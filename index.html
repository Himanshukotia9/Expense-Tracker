<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coin-Counter</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class=" flex flex-col items-center justify-center">
    <div id="container" class="w-[500px] h-auto bg-slate-200 p-8 rounded-2xl shadow-xl my-4">
      <h1 class="flex text-2xl font-bold my-2 p-2 justify-center">Coin Counter</h1>
      <form action="" id="expense-form" class="flex flex-col">
        <input type="text" id="description" placeholder=" Expense Description" class="border border-slate-300 rounded-md my-2 p-2" required/>
        <select name="" id="category" class="border border-slate-300 rounded-md my-2 p-2" required>
          <option value="">Select Category</option>
          <option value="Food">Food</option>
          <option value="Transportation">Transportation</option>
          <option value="Utilities">Utilities</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Others">Others</option>
        </select>
        <input type="number" id="amount" class="border border-slate-300 rounded-md my-2 p-2" placeholder=" Amount" required /><br>
        <input type="submit" value="Add Expense" class="my-2 bg-lime-400 hover:bg-lime-500 text-white font-bold p-2 rounded-md cursor-pointer">
      </form>
      <button onclick="deleteTbody()" class="w-[438px] flex flex-col my-2 bg-lime-400 hover:bg-lime-500 text-white font-bold p-2 rounded-md cursor-pointer items-center">Delete Expense List</button>
      <h3 class="text-base font-bold my-2">Expense Summary</h3>
      <table id="Expense-table" class="w-full border-collapse">
        <thead>
          <tr id="tableHead" class="bg-lime-400 text-white font-bold">
            <th class="p-2 border border-slate-300 text-left">Description</th>
            <th class="p-2 border border-slate-300 text-left">Category</th>
            <th class="p-2 border border-slate-300 text-left">Amount</th>
          </tr>
        </thead>
        <tbody id="Expense-list">

        </tbody>
      </table>
    </div>

    <script defer src="script.js"></script>
  </body>
</html>
